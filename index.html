<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório de Estoque — Painéis</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0d0f14; --surface: #161a22; --surface2: #1e2430;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --accent: #e8c547; --teal: #4fc3a1; --danger: #f06464; --warn: #f0a060;
  --text: #e2e4ec; --muted: #7a8494; --font-head: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-mono); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 12px; }
.wrap { max-width: 1450px; margin: 0 auto; padding: 24px; }
.header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; }
.header h1 { font-family: var(--font-head); font-size: 26px; font-weight: 800; }
.header h1 span { color: var(--accent); }

.filters { display: flex; gap: 10px; margin-bottom: 20px; }
select { background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; padding: 8px 12px; color: var(--text); font-family: var(--font-mono); outline: none; }

.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.card-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
.card-value { font-family: var(--font-head); font-size: 22px; font-weight: 800; }

.tabs { display: flex; gap: 2px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.tab { padding: 10px 18px; cursor: pointer; color: var(--muted); transition: 0.2s; border-bottom: 2px solid transparent; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: bold; }

.section { display: none; }
.section.active { display: block; }

.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 1000px; }
th { padding: 12px; text-align: left; background: var(--surface2); color: var(--muted); font-size: 10px; text-transform: uppercase; white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); }

.badge { padding: 3px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; }
.b-excess { background: rgba(79,195,161,0.15); color: var(--teal); }
.b-lack { background: rgba(240,100,100,0.15); color: var(--danger); }

.cross-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
.cross-head { padding: 12px 18px; background: var(--surface2); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
.cross-medida { font-family: var(--font-head); font-weight: 800; color: var(--accent); font-size: 14px; }
.cross-body { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.ce { border: 1px solid var(--border2); padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.1); }
.ce-title { font-weight: 700; margin-bottom: 10px; font-size: 10px; text-transform: uppercase; color: var(--muted); }
.item-row { font-size: 11px; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.03); line-height: 1.4; }
.critical { color: var(--danger); font-weight: bold; }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1>Estoque <span>Painéis</span></h1>
    <p id="last-update" style="color: var(--muted)">Análise de Demanda Atual vs Futura</p>
  </div>

  <div class="filters">
    <select id="f-especie" onchange="applyFilters()"><option value="">Todas as Espécies</option></select>
    <select id="f-medida" onchange="applyFilters()"><option value="">Todas as Medidas</option></select>

  <div class="cards">

  <div class="tabs">
    <div class="tab active" onclick="switchTab('tabela', this)">Relatório Detalhado</div>

        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-cross" class="section">
    <div id="cross-grid"></div>
  </div>
</div>

// Obs: No uso real, certifique-se de que a variável DADOS_CSV contenha todo o texto do seu CSV.

function parseNum(v) {
  if (!v || v === "" || v === "-") return 0;
  v = v.replace(/"/g, '').replace(/\./g, '').replace(',', '.');
  return parseFloat(v) || 0;
}

function fmt(n) {
  return n.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

let rows = [];

function init() {
  const lines = DADOS_CSV.split('\n').slice(1);
  rows = lines.filter(l => l.trim() !== '').map(l => {
    // Regex simples para lidar com vírgulas dentro de aspas
    return l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
  });

  const especies = [...new Set(rows.map(r => r[COL.ESPECIE]))].sort();
  const medidas = [...new Set(rows.map(r => r[COL.MEDIDA]))].sort();

  const selEsp = document.getElementById('f-especie');
  especies.forEach(e => selEsp.innerHTML += `<option value="${e}">${e}</option>`);

  const selMed = document.getElementById('f-medida');
  medidas.forEach(m => selMed.innerHTML += `<option value="${m}">${m}</option>`);

  applyFilters();
}

function applyFilters() {
  const fEsp = document.getElementById('f-especie').value;
  const fMed = document.getElementById('f-medida').value;

  const filtered = rows.filter(r => {
    return (fEsp === "" || r[COL.ESPECIE] === fEsp) && 
           (fMed === "" || r[COL.MEDIDA] === fMed);
  });

  renderStats(filtered);
  renderTable(filtered);
  renderCross(filtered);
}

function renderStats(data) {
  let totalEstoque = 0, faltaM0 = 0, faltaM1 = 0;
  data.forEach(r => {
    totalEstoque += (parseNum(r[COL.EST_COMPRAS]) + parseNum(r[COL.EST_PCP]));
    faltaM0 += parseNum(r[COL.FALTA_ATUAL]);
    faltaM1 += parseNum(r[COL.FALTA_SEG]);
  });
  document.getElementById('c-total').innerText = fmt(totalEstoque);
  document.getElementById('c-falta-m0').innerText = fmt(faltaM0);
  document.getElementById('c-falta-m1').innerText = fmt(faltaM1);
}

function renderTable(data) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  data.forEach(r => {
    const estC = parseNum(r[COL.EST_COMPRAS]);
    const estP = parseNum(r[COL.EST_PCP]);
    const estTotal = estC + estP;
    const fM0 = parseNum(r[COL.FALTA_ATUAL]);
    const fM1 = parseNum(r[COL.FALTA_SEG]);
    
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r[COL.ESPECIE]}</td>
      <td>${r[COL.GRUPO]}</td>
      <td>${r[COL.MEDIDA]}</td>
      <td><span class="badge ${r[COL.STATUS].includes('Falta')?'b-lack':'b-excess'}">${r[COL.STATUS]}</span></td>
      <td>${fmt(estC)}</td>
      <td>${fmt(estP)}</td>
      <td style="font-weight:700; color:var(--teal)">${fmt(estTotal)}</td>
      <td style="color:var(--danger)">${fmt(fM0)}</td>
      <td style="color:var(--warn)">${fmt(fM1)}</td>
    `;
    tbody.appendChild(tr);
  });
}

function renderCross(data) {
  const grid = document.getElementById('cross-grid');
  grid.innerHTML = '';
  const meds = {};

  data.forEach(r => {
    const m = r[COL.MEDIDA];
    if(!meds[m]) meds[m] = { est: 0, f0: 0, f1: 0, itens: [] };
    meds[m].est += (parseNum(r[COL.EST_COMPRAS]) + parseNum(r[COL.EST_PCP]));
    meds[m].f0 += parseNum(r[COL.FALTA_ATUAL]);
    meds[m].f1 += parseNum(r[COL.FALTA_SEG]);
    meds[m].itens.push(r);
  });

  Object.keys(meds).forEach(m => {
    const info = meds[m];
    if(info.est === 0 && info.f0 === 0 && info.f1 === 0) return;

    const needsAlert = info.est < (info.f0 + info.f1);

    const div = document.createElement('div');
    div.className = 'cross-card';
    div.innerHTML = `
      <div class="cross-head">
        <span class="cross-medida">${m}</span>
        <div style="font-size: 11px;">
          Estoque: <span style="color:var(--teal)">${fmt(info.est)}</span> | 
          Falta Total: <span class="${needsAlert?'critical':''}">${fmt(info.f0 + info.f1)}</span>
        </div>
      </div>
      <div class="cross-body">
        <div class="ce">
          <div class="ce-title">Demandas (M0 + M1)</div>
          ${info.itens.filter(i => (parseNum(i[COL.FALTA_ATUAL]) + parseNum(i[COL.FALTA_SEG])) > 0).map(i => `
            <div class="item-row">
              <b>${i[COL.PADRAO]}</b><br>
              <span style="color:var(--danger)">M0: ${i[COL.FALTA_ATUAL]}</span> | 
              <span style="color:var(--warn)">M1: ${i[COL.FALTA_SEG]}</span>
            </div>
          `).join('') || '<div style="color:var(--muted)">Sem faltas</div>'}
        </div>
        <div class="ce">
          <div class="ce-title">Disponível no Físico</div>
          ${info.itens.filter(i => (parseNum(i[COL.EST_COMPRAS]) + parseNum(i[COL.EST_PCP])) > 0).map(i => `
            <div class="item-row">
              ${i[COL.PADRAO]} <br> 
              <small>Compras: ${i[COL.EST_COMPRAS] || 0} / PCP: ${i[COL.EST_PCP] || 0}</small>
            </div>
          `).join('') || '<div style="color:var(--muted)">Sem estoque</div>'}
        </div>
      </div>
    `;
    grid.appendChild(div);
  });
}

function switchTab(id, el) {
  document.querySelectorAll('.tab, .section').forEach(x => x.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  el.classList.add('active');
}

window.onload = init;
</script>

</body>
</html>
